<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTT Finder India 🎬</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>

    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="nav-logo">🎬 OTT<span>Finder</span></div>
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Watchlist</a></li>
      </ul>
    </nav>

    <!-- HERO SECTION -->
    <section class="hero">
      <div class="hero-content">
        <h1>Find Where to Watch <span>Any Movie</span> in India 🇮🇳</h1>
        <p>Search across Netflix, Prime Video, JioCinema, Hotstar & more</p>

        <!-- SEARCH BAR -->
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="Search a movie or series..."
            autocomplete="off"
          />
          <button id="searchBtn">Search</button>
        </div>

        <!-- OTT PLATFORM BADGES -->
        <div class="platform-badges">
          <span>Netflix</span>
          <span>Prime Video</span>
          <span>JioCinema</span>
          <span>Hotstar</span>
          <span>SonyLIV</span>
          <span>ZEE5</span>
        </div>
      </div>
    </section>

    <!-- RESULTS SECTION (empty for now) -->
    <section class="results-section">
      <div id="resultsContainer" class="results-grid">
        <!-- Movie cards will appear here (Day 3) -->
      </div>
    </section>
    <script src="js/app.js"></script>
  </body>
</html>
